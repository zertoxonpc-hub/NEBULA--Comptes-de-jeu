<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres du compte — NEBULA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg-void: #08040f;
    --bg-panel: #120b24;
    --bg-panel-2: #180f2e;
    --line: rgba(157, 116, 237, 0.18);
    --violet: #7c3aed;
    --violet-2: #9d4edd;
    --pink: #ff4fc9;
    --cyan: #4fd8ff;
    --text: #f1ecfb;
    --text-dim: #a99bc7;
    --text-faint: #6e6289;
    --success: #3ee089;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-void);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
    position:relative;
  }
  ::selection{background:var(--violet); color:#fff;}

  #stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }

  .glow-cursor{
    position:fixed; width:500px; height:500px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,58,237,0.16) 0%, rgba(124,58,237,0) 70%);
    pointer-events:none; z-index:1; transform:translate(-50%,-50%);
    transition: opacity .3s;
  }

  a{color:inherit; text-decoration:none;}

  .wrap{max-width:1200px; margin:0 auto; padding:0 32px; position:relative; z-index:2;}

  /* NAV */
  header{
    position:sticky; top:0; z-index:50;
    backdrop-filter: blur(16px);
    background:rgba(8,4,15,0.72);
    border-bottom:1px solid var(--line);
  }
  nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px; max-width:1200px; margin:0 auto;
  }
  .logo{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:22px; letter-spacing:0.5px;
    display:flex; align-items:center; gap:9px;
  }
  .logo .dot{
    width:9px; height:9px; border-radius:50%;
    background: var(--pink);
    box-shadow: 0 0 12px 3px var(--pink);
  }

  .btn{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size:14px; cursor:pointer; border:none;
    padding:11px 20px; border-radius:10px; transition:transform .15s, box-shadow .2s;
    display:inline-flex; align-items:center; justify-content:center; text-align:center;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--violet-2), var(--pink));
    color:#fff; box-shadow:0 4px 24px -4px rgba(157,78,221,0.6);
  }
  .btn-primary:hover{transform:translateY(-1px); box-shadow:0 6px 28px -2px rgba(255,79,201,0.55);}
  .btn-ghost{
    background:var(--bg-panel); color:var(--text); border:1px solid var(--line);
  }
  .btn-ghost:hover{border-color:var(--violet-2);}

  /* SETTINGS PAGE */
  .settings-wrap{
    max-width:600px; margin:60px auto; padding:0 32px; position:relative; z-index:2;
  }
  .settings-header{
    text-align:center; margin-bottom:42px;
  }
  .settings-header h1{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:32px; margin-bottom:8px;
  }
  .settings-header p{
    color:var(--text-dim); font-size:15px;
  }

  .settings-panel{
    background:linear-gradient(165deg, var(--bg-panel-2), var(--bg-panel));
    border:1px solid var(--line); border-radius:18px; padding:32px; margin-bottom:24px;
  }
  .settings-panel h2{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:18px; margin-bottom:22px;
    display:flex; align-items:center; gap:8px;
  }

  .avatar-section{
    display:flex; flex-direction:column; align-items:center; margin-bottom:28px;
  }
  .avatar-display{
    width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid var(--violet-2);
    margin-bottom:16px;
  }
  .avatar-upload-btn{
    padding:10px 18px; font-size:13.5px;
  }

  .form-group{
    margin-bottom:20px;
  }
  .form-group label{
    display:block; font-size:13px; color:var(--text-dim); margin-bottom:8px;
    font-family:'JetBrains Mono', monospace; font-weight:500;
  }
  .form-group input{
    width:100%; padding:12px 14px; background:var(--bg-void); border:1px solid var(--line);
    border-radius:10px; color:var(--text); font-family:'Inter', sans-serif; font-size:14px;
  }
  .form-group input:focus{
    outline:none; border-color:var(--violet-2);
  }

  .form-actions{
    display:flex; gap:12px; margin-top:24px;
  }
  .form-actions .btn{
    flex:1;
  }

  .success-msg{
    color:var(--success); font-size:13.5px; margin-top:12px; display:none;
  }
  .error-msg{
    color:var(--pink); font-size:13.5px; margin-top:12px; display:none;
  }

  .danger-zone{
    border:1px solid rgba(255,79,201,0.3); border-radius:12px; padding:20px; margin-top:32px;
  }
  .danger-zone h3{
    color:var(--pink); font-size:15px; margin-bottom:12px; font-family:'Space Grotesk',sans-serif;
  }
  .danger-zone p{
    color:var(--text-faint); font-size:13px; margin-bottom:14px;
  }

  @media (max-width:900px){
    nav{padding:14px 16px;}
    .settings-wrap{margin:50px auto;}
  }

  @media (max-width:768px){
    nav{
      flex-wrap:wrap;
      padding:12px 16px;
    }
    .logo{font-size:18px;}
    .settings-wrap{
      max-width:100%;
      margin:40px auto;
      padding:0 24px;
    }
    .settings-header h1{font-size:26px;}
    .settings-header p{font-size:14px;}
    .settings-panel{
      padding:24px; margin-bottom:20px;
    }
    .settings-panel h2{font-size:16px;}
    .avatar-display{width:100px; height:100px;}
    .form-group label{font-size:12px;}
    .form-group input{padding:11px 13px; font-size:13px;}
    .form-actions{flex-direction:column;}
    .form-actions .btn{font-size:13px;}
  }

  @media (max-width:600px){
    .wrap{padding:0 16px;}
    nav{
      padding:12px 16px;
      flex-direction:column; gap:10px;
    }
    .logo{font-size:16px;}
    .settings-wrap{
      max-width:100%;
      margin:30px auto;
      padding:0 16px;
    }
    .settings-header{
      margin-bottom:28px;
      text-align:center;
    }
    .settings-header h1{
      font-size:22px; margin-bottom:6px;
    }
    .settings-header p{font-size:13px; color:var(--text-dim);}
    
    .settings-panel{
      padding:18px 16px; margin-bottom:16px;
      border-radius:14px;
    }
    .settings-panel h2{
      font-size:15px; margin-bottom:16px;
      gap:6px;
    }

    .avatar-section{margin-bottom:20px;}
    .avatar-display{
      width:90px; height:90px;
      margin-bottom:12px;
      border-width:2px;
    }
    .avatar-upload-btn{
      padding:8px 14px; font-size:12px;
    }

    .form-group{margin-bottom:14px;}
    .form-group label{
      font-size:11.5px; margin-bottom:6px;
    }
    .form-group input, .form-group textarea{
      padding:10px 12px; font-size:12px;
      border-radius:8px;
    }

    .form-actions{
      flex-direction:column; gap:8px;
      margin-top:16px;
    }
    .form-actions .btn{
      width:100%; padding:10px;
      font-size:12px; border-radius:8px;
    }

    .success-msg, .error-msg{
      font-size:12px; margin-top:10px;
    }

    .danger-zone{
      padding:16px; margin-top:20px;
      border-radius:12px;
    }
    .danger-zone h3{
      font-size:14px; margin-bottom:10px;
    }
    .danger-zone p{
      font-size:12px; margin-bottom:12px;
    }
    .danger-zone .btn{
      width:100%; padding:9px;
      font-size:12px;
    }
  }

  @media (max-width:480px){
    nav{padding:10px 12px;}
    .logo{font-size:14px;}
    .settings-wrap{
      margin:20px auto;
      padding:0 12px;
    }
    .settings-header h1{
      font-size:20px; margin-bottom:4px;
    }
    .settings-header p{font-size:12px;}
    
    .settings-panel{
      padding:14px 12px; margin-bottom:12px;
    }
    .settings-panel h2{font-size:14px; margin-bottom:12px;}

    .avatar-display{
      width:80px; height:80px;
      margin-bottom:10px;
    }
    .avatar-upload-btn{
      padding:7px 12px; font-size:11px;
    }

    .form-group{margin-bottom:11px;}
    .form-group label{font-size:10.5px; margin-bottom:5px;}
    .form-group input, .form-group textarea{
      padding:8px 10px; font-size:11px;
    }

    .form-actions{margin-top:12px; gap:6px;}
    .form-actions .btn{padding:8px; font-size:11px;}

    .success-msg, .error-msg{font-size:11px; margin-top:8px;}

    .danger-zone{
      padding:12px; margin-top:16px;
    }
    .danger-zone h3{font-size:13px; margin-bottom:8px;}
    .danger-zone p{font-size:11px; margin-bottom:10px;}
    .danger-zone .btn{padding:8px; font-size:11px;}
  }

</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="glow-cursor" id="glow"></div>

<header>
  <nav>
    <a class="logo" href="index.html"><span class="dot"></span>NEBULA</a>
    <div class="nav-cta" style="margin-left:auto;">
      <a class="btn btn-ghost" href="index.html">← Retour à la boutique</a>
    </div>
  </nav>
</header>

<div class="settings-wrap">
  <div class="settings-header">
    <h1>⚙️ Paramètres du compte</h1>
    <p>Gère ton profil et tes préférences</p>
  </div>

  <!-- PROFIL PANEL -->
  <div class="settings-panel">
    <h2>👤 Mon profil</h2>
    <div class="avatar-section">
      <img id="avatar-preview" class="avatar-display" alt="Photo de profil">
      <input type="file" id="avatar-input" accept="image/*" style="display:none;">
      <button class="btn btn-ghost avatar-upload-btn" id="avatar-btn">Changer la photo</button>
    </div>

    <div class="form-group">
      <label>Pseudo</label>
      <input type="text" id="pseudo-input" placeholder="Ton pseudonyme" maxlength="30">
    </div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email-input" placeholder="ton@email.com">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" id="save-profile-btn">Enregistrer les modifications</button>
    </div>
    <div class="success-msg" id="profile-success">✓ Profil mis à jour avec succès.</div>
    <div class="error-msg" id="profile-error"></div>
  </div>

  <!-- SÉCURITÉ PANEL -->
  <div class="settings-panel">
    <h2>🔐 Sécurité</h2>
    
    <div class="form-group">
      <label>Mot de passe actuel</label>
      <input type="password" id="current-password" placeholder="••••••••">
    </div>

    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-password" placeholder="••••••••" minlength="6">
    </div>

    <div class="form-group">
      <label>Confirmer le nouveau mot de passe</label>
      <input type="password" id="confirm-password" placeholder="••••••••" minlength="6">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" id="change-password-btn">Changer le mot de passe</button>
      <button class="btn btn-ghost" id="reset-password-btn">Réinitialiser</button>
    </div>
    <div class="success-msg" id="password-success">✓ Mot de passe changé avec succès.</div>
    <div class="error-msg" id="password-error"></div>
  </div>

  <!-- DANGER ZONE -->
  <div class="danger-zone">
    <h3>⚠️ Zone de danger</h3>
    <p>Supprime toutes les données de ton compte de ce navigateur.</p>
    <button class="btn btn-ghost" id="logout-btn" style="border-color:rgba(255,79,201,0.5); color:var(--pink);">Se déconnecter</button>
  </div>
</div>

<script>
// Starfield background
(function(){
  const canvas = document.getElementById('stars');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = document.body.scrollHeight;
  }
  function initStars(){
    stars = [];
    const count = Math.floor((w*h)/9000);
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: Math.random()*1.3 + 0.2,
        a: Math.random(),
        hue: Math.random() > 0.85 ? '157,78,221' : '241,236,251'
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const s of stars){
      s.a += (Math.random()-0.5)*0.02;
      s.a = Math.max(0.1, Math.min(1, s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${s.hue},${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', ()=>{ resize(); initStars(); });
  resize(); initStars(); draw();

  const glow = document.getElementById('glow');
  if(glow){
    const hasMouse = window.matchMedia('(pointer:fine)').matches;
    if(hasMouse){
      window.addEventListener('mousemove', (e)=>{
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
      });
    } else {
      glow.style.display = 'none';
    }
  }
})();

// --- Gestion du compte avec localStorage ---
const STORAGE_KEY = 'nebula_user_account';

function getAccount(){
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : null;
}

function saveAccount(account){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(account));
}

function displayAccount(){
  // First check for URL-based auth (like index.html)
  const params = new URLSearchParams(window.location.search);
  const isLoggedInViaURL = params.get('auth') === '1';

  if(isLoggedInViaURL){
    // Use URL parameters for account info
    const user = params.get('user') || 'Membre';
    const avatarURL = params.get('avatar');

    document.getElementById('pseudo-input').value = user;
    // Email is not available in URL params, leave blank for user to fill
    document.getElementById('email-input').value = '';

    const avatar = document.getElementById('avatar-preview');
    if(avatarURL){
      avatar.src = avatarURL;
    } else {
      avatar.src = makeMonogramAvatar(user);
    }
    return;
  }

  // Fallback to localStorage
  const account = getAccount();
  if(!account) {
    window.location.href = 'login.html?return=' + encodeURIComponent(window.location.href);
    return;
  }

  document.getElementById('pseudo-input').value = account.pseudo || '';
  document.getElementById('email-input').value = account.email || '';

  const avatarImg = document.getElementById('avatar-preview');
  if(account.avatar){
    avatarImg.src = account.avatar;
  } else {
    avatarImg.src = makeMonogramAvatar(account.pseudo);
  }
}

function makeMonogramAvatar(pseudo){
  const canvas = document.createElement('canvas');
  canvas.width = 120; canvas.height = 120;
  const ctx = canvas.getContext('2d');
  let hash = 0;
  for(let i=0;i<pseudo.length;i++) hash = pseudo.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  ctx.fillStyle = `hsl(${hue}, 65%, 45%)`;
  ctx.fillRect(0,0,120,120);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 50px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((pseudo[0] || '?').toUpperCase(), 60, 65);
  return canvas.toDataURL('image/jpeg', 0.8);
}

// Avatar upload
document.getElementById('avatar-btn').addEventListener('click', ()=> document.getElementById('avatar-input').click());
document.getElementById('avatar-input').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const size = 120;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
      const resized = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('avatar-preview').src = resized;
      
      const account = getAccount();
      account.avatar = resized;
      saveAccount(account);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Save profile
document.getElementById('save-profile-btn').addEventListener('click', ()=>{
  const account = getAccount();
  const newPseudo = document.getElementById('pseudo-input').value.trim();
  const newEmail = document.getElementById('email-input').value.trim();
  
  if(!newPseudo || !newEmail){
    showError('profile-error', 'Le pseudo et l\'e-mail sont requis.');
    return;
  }

  account.pseudo = newPseudo;
  account.email = newEmail;
  saveAccount(account);
  
  showSuccess('profile-success');
});

// Change password
document.getElementById('change-password-btn').addEventListener('click', ()=>{
  const account = getAccount();
  const current = document.getElementById('current-password').value;
  const newPwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;

  if(!current || !newPwd || !confirm){
    showError('password-error', 'Tous les champs sont requis.');
    return;
  }
  if(current !== account.password){
    showError('password-error', 'Le mot de passe actuel est incorrect.');
    return;
  }
  if(newPwd !== confirm){
    showError('password-error', 'Les nouveaux mots de passe ne correspondent pas.');
    return;
  }
  if(newPwd.length < 6){
    showError('password-error', 'Le mot de passe doit contenir au moins 6 caractères.');
    return;
  }

  account.password = newPwd;
  saveAccount(account);
  document.getElementById('current-password').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('confirm-password').value = '';
  showSuccess('password-success');
});

document.getElementById('reset-password-btn').addEventListener('click', ()=>{
  document.getElementById('current-password').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('confirm-password').value = '';
});

document.getElementById('logout-btn').addEventListener('click', ()=>{
  if(confirm('Êtes-vous sûr(e) ? Vous allez être déconnecté(e).')){
    localStorage.removeItem(STORAGE_KEY);
    window.location.href = 'index.html';
  }
});

function showSuccess(id){
  document.getElementById(id).style.display = 'block';
  setTimeout(()=> document.getElementById(id).style.display = 'none', 3500);
}

function showError(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=> el.style.display = 'none', 4000);
}

displayAccount();
</script>

</body>
</html>
